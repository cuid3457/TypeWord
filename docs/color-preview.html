<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Color Preview</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #111; color: #fff; padding: 40px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; max-width: 900px; }
  .card { border-radius: 16px; padding: 24px; text-align: center; }
  .card .label { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .card .hex { font-size: 12px; color: rgba(255,255,255,0.7); }
  .card .btn { margin-top: 16px; padding: 12px 24px; border-radius: 12px; color: #fff; font-weight: 600; font-size: 14px; border: none; cursor: pointer; width: 100%; }
  h2 { margin-bottom: 24px; font-weight: 300; }
</style></head><body>
<h2>Button Color Preview</h2>
<div class="grid">
  <div class="card" style="background:#1a1a1a; border:1px solid #333;">
    <div class="label">Muted Mint 1</div>
    <div class="hex">#5BA99A</div>
    <button class="btn" style="background:#5BA99A;">Save to list</button>
  </div>
  <div class="card" style="background:#1a1a1a; border:1px solid #333;">
    <div class="label">Muted Mint 2</div>
    <div class="hex">#4E9E8F</div>
    <button class="btn" style="background:#4E9E8F;">Save to list</button>
  </div>
  <div class="card" style="background:#1a1a1a; border:1px solid #333;">
    <div class="label">Muted Mint 3</div>
    <div class="hex">#6AADA0</div>
    <button class="btn" style="background:#6AADA0;">Save to list</button>
  </div>
  <div class="card" style="background:#1a1a1a; border:1px solid #333;">
    <div class="label">Muted Mint 4</div>
    <div class="hex">#579589</div>
    <button class="btn" style="background:#579589;">Save to list</button>
  </div>
  <div class="card" style="background:#1a1a1a; border:1px solid #333;">
    <div class="label">Muted Mint 5</div>
    <div class="hex">#4A8E82</div>
    <button class="btn" style="background:#4A8E82;">Save to list</button>
  </div>
</div>
</body></html>
